name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-folder
          path: src-tauri/target/release/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-windows]
    permissions:
      contents: write
    steps:
      - name: Download exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release
      
      - name: Download web
        uses: actions/download-artifact@v4
        with:
          name: web
          path: release/web

      - name: List files
        run: |
          ls -la release/
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release/**/*"
          artifactErrorsFailBuild: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}