name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build All
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Windows
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: src-tauri/target/release/xingju-core.exe
