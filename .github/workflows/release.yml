name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build All
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Check target directory
        run: |
          Write-Host "=== Checking target directory ==="
          if (Test-Path "src-tauri/target") {
            Get-ChildItem "src-tauri/target" -Directory | ForEach-Object { Write-Host "Dir: $_" }
          }
          Write-Host "=== Checking release ==="
          if (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release") {
            Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release" -File | ForEach-Object { Write-Host "File: $($_.Name)" }
          }

      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/xingju.exe
          if-no-files-found: warn

      - name: Upload all release files
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: src-tauri/target/x86_64-pc-windows-msvc/release/
          if-no-files-found: warn