name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build All
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Windows
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release
          gh release create ${{ github.ref_name }} --title "XingJu ${{ github.ref_name }}" --notes "Auto-generated release"
          
          # Upload EXE
          gh release upload ${{ github.ref_name }} src-tauri/target/release/xingju-core.exe --clobber
          
          # Create and upload web zip
          cd dist
          powershell -Command "Compress-Archive -Path * -DestinationPath ../web.zip -Force"
          cd ..
          gh release upload ${{ github.ref_name }} web.zip --clobber