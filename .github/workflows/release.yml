name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build All
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Find exe files
        run: |
          Write-Host "=== Looking for exe files ==="
          Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.exe" | Select-Object -First 10 FullName,Length

      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/

      - name: Upload exe (XingJu.exe)
        uses: actions/upload-artifact@v4
        with:
          name: exe-xingju
          path: src-tauri/target/x86_64-pc-windows-msvc/release/XingJu.exe
          if-no-files-found: warn

      - name: Upload exe (xingju.exe)
        uses: actions/upload-artifact@v4
        with:
          name: exe-binary
          path: src-tauri/target/x86_64-pc-windows-msvc/release/xingju.exe
          if-no-files-found: warn

      - name: Upload all release
        uses: actions/upload-artifact@v4
        with:
          name: release-all
          path: src-tauri/target/x86_64-pc-windows-msvc/release/
          if-no-files-found: warn