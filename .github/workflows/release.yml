name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build for Windows'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build for Linux'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build for macOS'
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build Web
        run: npm run build
      - name: Build Tauri application
        run: npm run tauri build
      - name: Prepare artifacts
        shell: pwsh
        run: |
          mkdir -p release-files
          if (Test-Path "target/release/XingJu.exe") { Copy-Item "target/release/XingJu.exe" "release-files/" }
          if (Test-Path "target/release/bundle/nsis") { Get-ChildItem "target/release/bundle/nsis/*.exe" | ForEach-Object { Copy-Item $_ "release-files/" } }
          if (Test-Path "target/release/bundle/msi") { Get-ChildItem "target/release/bundle/msi/*.msi" | ForEach-Object { Copy-Item $_ "release-files/" } }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release-files/*
          if-no-files-found: warn

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev libsoup-3.0-dev javascriptcoregtk-4.1-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build Web
        run: npm run build
      - name: Build Tauri application
        run: npm run tauri build
      - name: Prepare artifacts
        run: |
          mkdir -p release-files
          [ -f "target/release/xingju" ] && cp target/release/xingju release-files/xingju-linux-x64
          [ -d "target/release/bundle/appimage" ] && cp target/release/bundle/appimage/*.AppImage release-files/ || true
          [ -d "target/release/bundle/deb" ] && cp target/release/bundle/deb/*.deb release-files/ || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release-files/*
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build Web
        run: npm run build
      - name: Build Tauri application
        run: npm run tauri build --target ${{ matrix.target }}
      - name: Prepare artifacts
        run: |
          mkdir -p release-files
          [ -d "target/${{ matrix.target }}/release/bundle/macos" ] && zip -r release-files/XingJu-${{ matrix.target }}.app.zip target/${{ matrix.target }}/release/bundle/macos/*.app || true
          [ -d "target/${{ matrix.target }}/release/bundle/dmg" ] && cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg release-files/ || true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}-artifacts
          path: release-files/*
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.app.zip" -o -name "xingju-*" \) -exec cp {} release-files/ \;
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body: |
            ## XingJu ${{ github.ref_name }}
            
            ### 功能特性
            - 🎵 多平台音乐聚合
            - 🎬 多平台视频聚合
            - 📖 小说阅读
            - 📚 漫画浏览
            - 🌃 赛博朋克 UI 风格
          draft: false