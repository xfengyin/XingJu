name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build

      - name: Find built files
        shell: pwsh
        run: |
          Write-Host "=== Looking for exe files ==="
          Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.exe" -File | Select-Object FullName,Length
          Write-Host ""
          Write-Host "=== Looking for installer files ==="
          Get-ChildItem -Path "src-tauri/target" -Recurse -Include "*.msi","*.exe" -File | Where-Object { $_.FullName -like "*bundle*" } | Select-Object FullName,Length

      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: xingju-exe
          path: |
            src-tauri/target/release/XingJu.exe
            src-tauri/target/release/xingju.exe
          if-no-files-found: error

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -name "*.exe" -exec cp {} release-files/ \;
          find artifacts -name "*.msi" -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          draft: false
          prerelease: false