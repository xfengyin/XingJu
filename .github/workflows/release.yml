name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build All
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/

      - name: Find exe
        run: |
          Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/xingju.exe
          if-no-files-found: warn

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: setup
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn