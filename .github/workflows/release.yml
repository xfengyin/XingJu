name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: xingju-web
          path: dist/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install

      - name: Build Windows
        run: |
          npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Find and list exe files
        run: |
          Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: xingju-windows-exe
          path: src-tauri/target/release/*.exe

  create-release:
    runs-on: ubuntu-latest
    needs: [build-web, build-windows]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: xingju-web
          path: release/web

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: xingju-windows-exe
          path: release/windows
          if-no-files-found: ignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/web/**/*
            release/windows/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}