name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build for Windows'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build for Linux'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build for macOS'
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  # ========================================
  # Windows 构建
  # ========================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build

      - name: Prepare artifacts
        shell: pwsh
        run: |
          mkdir -p release-files
          # 主程序
          if (Test-Path "target/release/XingJu.exe") {
            Copy-Item "target/release/XingJu.exe" "release-files/"
          }
          # NSIS 安装包
          if (Test-Path "target/release/bundle/nsis") {
            Get-ChildItem "target/release/bundle/nsis/*.exe" | ForEach-Object { Copy-Item $_ "release-files/" }
          }
          # MSI 安装包
          if (Test-Path "target/release/bundle/msi") {
            Get-ChildItem "target/release/bundle/msi/*.msi" | ForEach-Object { Copy-Item $_ "release-files/" }
          }
          Get-ChildItem "release-files/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release-files/*
          if-no-files-found: warn

  # ========================================
  # Linux 构建
  # ========================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build

      - name: Prepare artifacts
        run: |
          mkdir -p release-files
          # 主程序
          [ -f "target/release/xingju" ] && cp target/release/xingju release-files/xingju-linux-x64
          # AppImage
          [ -d "target/release/bundle/appimage" ] && cp target/release/bundle/appimage/*.AppImage release-files/ || true
          # Deb 包
          [ -d "target/release/bundle/deb" ] && cp target/release/bundle/deb/*.deb release-files/ || true
          ls -la release-files/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release-files/*
          if-no-files-found: warn

  # ========================================
  # macOS 构建
  # ========================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          mkdir -p release-files
          # App bundle
          [ -d "target/${{ matrix.target }}/release/bundle/macos" ] && \
            zip -r release-files/XingJu-${{ matrix.target }}.app.zip target/${{ matrix.target }}/release/bundle/macos/*.app || true
          # DMG
          [ -d "target/${{ matrix.target }}/release/bundle/dmg" ] && \
            cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg release-files/ || true
          ls -la release-files/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}-artifacts
          path: release-files/*
          if-no-files-found: warn

  # ========================================
  # 发布
  # ========================================
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.app.zip" -o -name "xingju-*" \) -exec cp {} release-files/ \;
          
          # 重命名文件，添加平台标识
          for f in release-files/*; do
            if [[ "$f" == *"XingJu.exe" ]]; then
              mv "$f" "${f%.exe}-windows-x64.exe"
            elif [[ "$f" == *"xingju-linux-x64" ]]; then
              mv "$f" "XingJu-linux-x64"
            fi
          done
          
          echo "=== Release files ==="
          ls -la release-files/

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          cat > release-notes.md << EOF
          ## XingJu $TAG
          
          ### 下载说明
          
          | 平台 | 文件 | 说明 |
          |------|------|------|
          | Windows | \`XingJu-windows-x64.exe\` | 便携版 |
          | Windows | \`XingJu_*_x64-setup.exe\` | NSIS 安装包 |
          | Windows | \`XingJu_*_x64_en-US.msi\` | MSI 安装包 |
          | Linux | \`XingJu-linux-x64\` | 便携版 |
          | Linux | \`*.AppImage\` | AppImage 格式 |
          | Linux | \`*.deb\` | Debian/Ubuntu 包 |
          | macOS (Intel) | \`XingJu-x86_64-apple-darwin.app.zip\` | Intel Mac |
          | macOS (M1/M2) | \`XingJu-aarch64-apple-darwin.app.zip\` | Apple Silicon |
          
          ### 系统要求
          - Windows 10/11 (x64)
          - Linux (glibc 2.31+, x64)
          - macOS 10.15+ (Intel 或 Apple Silicon)
          
          ### 功能特性
          - 🎵 多平台音乐聚合
          - 🎬 多平台视频聚合
          - 📖 小说阅读
          - 📚 漫画浏览
          - 🌃 赛博朋克 UI 风格
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}