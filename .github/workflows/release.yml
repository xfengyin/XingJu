name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.75"
  NODE_VERSION: "18"

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri build -- --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find exe files
        shell: pwsh
        run: |
          Write-Host "=== Looking for exe files ==="
          Get-ChildItem -Path "." -Recurse -Filter "*.exe" -File | Select-Object -First 20 FullName,Length

      - name: List release directory
        shell: pwsh
        run: |
          Write-Host "=== Release directory contents ==="
          if (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release") {
            Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release" | Select-Object Name,Length
          }
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File | Select-Object FullName,Length
          }

      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/

      - name: Upload exe (main binary)
        uses: actions/upload-artifact@v4
        with:
          name: exe-main
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/XingJu.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/xingju.exe
          if-no-files-found: warn

      - name: Upload all release
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: warn