name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build All
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build

      - name: Build Windows
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        run: |
          $tag = "${{ github.ref }}" -replace "refs/tags/", ""
          $body = @{
            tag_name = $tag
            name = "XingJu $tag"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json
          
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" `
            -Method Post `
            -Headers @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}" } `
            -ContentType "application/json" `
            -Body $body
          
          $releaseId = $response.id
          Write-Host "Created release ID: $releaseId"
          
          # Upload exe
          $exePath = "src-tauri/target/release/xingju-core.exe"
          if (Test-Path $exePath) {
            Invoke-RestMethod -Uri "https://uploads.github.com/repos/${{ github.repository }}/releases/$releaseId/assets?name=xingju.exe" `
              -Method Post `
              -Headers @{ 
                Authorization = "token ${{ secrets.GITHUB_TOKEN }}"
                Content-Type = "application/octet-stream"
              } `
              -InFile $exePath
            Write-Host "Uploaded exe"
          }
        shell: pwsh