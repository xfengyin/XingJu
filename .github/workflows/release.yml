name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: xingju-web
          path: dist/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Install dependencies
        run: |
          npm install

      - name: Build Windows
        run: |
          npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows NSIS
        uses: actions/upload-artifact@v4
        with:
          name: xingju-windows-nsis
          path: src-tauri/target/release/bundle/nsis/**/*.exe
          if-no-files-found: ignore

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: xingju-windows-msi
          path: src-tauri/target/release/bundle/msi/**/*.msi
          if-no-files-found: ignore

  create-release:
    runs-on: ubuntu-latest
    needs: [build-web, build-windows]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: xingju-web
          path: release/web

      - name: Download Windows NSIS
        uses: actions/download-artifact@v4
        with:
          name: xingju-windows-nsis
          path: release/windows-nsis
          if-no-files-found: ignore

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: xingju-windows-msi
          path: release/windows-msi
          if-no-files-found: ignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/web/**/*
            release/windows-nsis/**/*.exe
            release/windows-msi/**/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}