name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: deb
          - os: ubuntu-latest
            target: appimage
          - os: windows-latest
            target: nsis
          - os: macos-latest
            target: dmg
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "XingJu v${{ github.ref_name }}"
          releaseBody: "XingJu 星聚 v${{ github.ref_name }} 多平台安装包"
          releaseDraft: false
          prerelease: false

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        run: echo "Release completed"

