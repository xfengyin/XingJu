name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: xingju-web
          path: dist/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        run: dir /s /b src-tauri\target\release\*.exe

      - name: Upload Windows folder
        uses: actions/upload-artifact@v4
        with:
          name: xingju-windows
          path: src-tauri/target/release/
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: xingju-web
          path: release/web

      - name: Download Windows folder
        uses: actions/download-artifact@v4
        with:
          name: xingju-windows
          path: release/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/web/**/*
            release/windows/*.exe
            release/windows/*.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}