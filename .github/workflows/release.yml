name: Build and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - feature/refactor-optimize-2026
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build for Windows'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build for Linux'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build for macOS'
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Remove lock file
        run: rm -f package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Web
        run: npm run build
      
      - name: Build Tauri
        run: npm run tauri build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            target/release/*.exe
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: warn

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Remove lock file
        run: rm -f package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Web
        run: npm run build
      
      - name: Build Tauri
        run: npm run tauri build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            target/release/xingju
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Remove lock file
        run: rm -f package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Web
        run: npm run build
      
      - name: Build Tauri
        run: npm run tauri build --target ${{ matrix.target }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}-artifacts
          path: |
            target/${{ matrix.target }}/release/bundle/macos/*.app
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.app.zip" \) -exec cp {} release-files/ \;
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body: |
            ## XingJu ${{ github.ref_name }}
            
            ### 功能特性
            - 🎵 多平台音乐聚合
            - 🎬 多平台视频聚合
            - 📖 小说阅读
            - 📚 漫画浏览
            - 🌃 赛博朋克 UI 风格
          draft: false
          generate_release_notes: true
