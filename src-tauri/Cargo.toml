[package]
name = "xingju-core"
version = "2.0.0"
edition = "2021"
authors = ["Kk <xfengyin@gmail.com>"]
license = "MIT"

[lib]
name = "xingju_core"
crate-type = ["cdylib", "staticlib", "lib"]

[dependencies]
tauri = { version = "2.0.0", features = [] }
tauri-plugin-shell = "2.0.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

# Prevent pulling latest crates that need Rust 1.87+
[patch.crates-io]
darling = { version = "0.20", tag = "v0.20.10" }
serde_with = { version = "3.0", tag = "3.0.0" }
time = { version = "0.3", tag = "v0.3.36" }
